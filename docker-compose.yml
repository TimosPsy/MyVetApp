services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest 
    container_name: vetmvc9rest-db                     
    environment:
      ACCEPT_EULA: "Y"                                
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"             
    ports:
      - "${DB_PORT:-1436}:1433"                       
    volumes:
      - sqlserver-data:/var/opt/mssql                  
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    build: .
    container_name: vetmvc9rest-app
    ports:
      - "${APP_PORT:-8081}:8080"              
    environment:
       ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
       ConnectionStrings__DevConnection: "Server=${DB_HOST};Database=${DB_NAME};User=${DB_USER};Password=${DB_USER_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True"
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
       sqlserver:
         condition: service_healthy

volumes:
  sqlserver-data:
  dataprotection-keys: